name: CI
on: [push]

jobs:
    unit_tests_php83:
        name: Unit tests PHP 8.3
        runs-on: ubuntu-latest
        container: php:8.3
        steps:
            -   uses: actions/checkout@v1
            -   uses: docker://composer:2
                with:
                    args: composer install --no-ansi --no-progress
            -   run: ./vendor/bin/phpunit --coverage-clover=build/coverage.xml --testsuite unit-tests
            -   uses: codecov/codecov-action@v1
                with:
                    file: ./build/coverage.xml
                    token: ${{secrets.CODECOV_TOKEN}}
                    flags: unittests
    unit_tests_php85:
        name: Unit tests PHP 8.5
        runs-on: ubuntu-latest
        container: php:8.5
        steps:
            -   uses: actions/checkout@v1
            -   uses: docker://composer:2
                with:
                    args: composer install --no-ansi --no-progress
            -   run: ./vendor/bin/phpunit --testsuite unit-tests
    PSR12_code_style:
        name: PSR 12 Codestyle checks
        runs-on: ubuntu-latest
        container: php:8.3
        steps:
            -   uses: actions/checkout@v1
            -   uses: docker://composer:2
                with:
                    args: composer install --no-ansi --no-progress
            -   run: ./vendor/bin/phpcs --standard=PSR12 src
    Static_analysis:
        name: Static analysis checks
        runs-on: ubuntu-latest
        container: php:8.3
        steps:
            -   uses: actions/checkout@v1
            -   uses: docker://composer:2
                with:
                    args: composer install --no-ansi --no-progress
            -   run: vendor/bin/phpstan analyse -l 6 src tests
    functional_tests_php83:
        name: Functional tests PHP 8.3
        runs-on: ubuntu-latest
        container: php:8.3
        services:
            mercure:
                image: dunglas/mercure
                env:
                    SERVER_NAME: ':80' # disables HTTPS
                    MERCURE_PUBLISHER_JWT_KEY: aVerySecretKeyThatIsAtLeast256Bi
                    MERCURE_SUBSCRIBER_JWT_KEY: aVerySecretKeyThatIsAtLeast256Bi
        steps:
            -   uses: actions/checkout@v1
            -   uses: docker://composer:2
                with:
                    args: composer install --no-ansi --no-progress
            -   run: ./vendor/bin/phpunit --testsuite functional-tests
    functional_tests_php85:
        name: Functional tests PHP 8.5
        runs-on: ubuntu-latest
        container: php:8.5
        services:
            mercure:
                image: dunglas/mercure
                env:
                    SERVER_NAME: ':80' # disables HTTPS
                    MERCURE_PUBLISHER_JWT_KEY: aVerySecretKeyThatIsAtLeast256Bi
                    MERCURE_SUBSCRIBER_JWT_KEY: aVerySecretKeyThatIsAtLeast256Bi
        steps:
            -   uses: actions/checkout@v1
            -   uses: docker://composer:2
                with:
                    args: composer install --no-ansi --no-progress
            -   run: ./vendor/bin/phpunit --testsuite functional-tests
